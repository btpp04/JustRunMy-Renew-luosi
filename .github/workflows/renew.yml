name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    # 每3天北京时间约9:00 (UTC 1:00) 自动运行
    - cron: '0 1 */3 * *'
    # 每3天北京时间约21:00 (UTC 13:00) 自动运行（双保险）
    - cron: '0 13 */3 * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛡️ 启动 Sing-Box 代理 (支持 hy2/vless/vmess/tuic/socks5/http)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "ℹ️ 未配置 PROXY_URL，将使用 GitHub Actions 本地网络直连。"
            echo "USE_PROXY=false" >> $GITHUB_ENV
          else
            echo "🔗 代理链接: ${PROXY_URL%%@*}@***"
            # 下载 sing-box
            SINGBOX_VER="1.13.7"
            wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
            tar xzf sing-box-${SINGBOX_VER}-linux-amd64.tar.gz
            chmod +x sing-box-${SINGBOX_VER}-linux-amd64/sing-box
            mv sing-box-${SINGBOX_VER}-linux-amd64/sing-box sing-box

            # 用 Python 解析代理链接生成 sing-box 配置
            python3 << 'PYEOF'
          import json, sys, urllib.parse, os

          url = os.environ.get('PROXY_URL', '')
          parsed = urllib.parse.urlparse(url)
          proto = parsed.scheme.lower()

          outbound = {'tag': 'proxy', 'type': proto}
          outbound['server'] = parsed.hostname
          outbound['server_port'] = parsed.port or 443

          qs = dict(urllib.parse.parse_qsl(parsed.query))

          if proto == 'hysteria2':
              outbound['password'] = parsed.password or (parsed.username if parsed.username else '')
              outbound['tls'] = {'enabled': True, 'server_name': qs.get('sni',''), 'insecure': qs.get('insecure','0')=='1'}
          elif proto == 'vless':
              outbound['uuid'] = urllib.parse.unquote(parsed.username or '')
              outbound['tls'] = {'enabled': True, 'server_name': qs.get('sni',''), 'insecure': qs.get('insecure','0')=='1'}
              if qs.get('type') == 'ws':
                  outbound['transport'] = {'type': 'ws', 'path': qs.get('path','/'), 'headers': {'Host': qs.get('host','')}}
          elif proto == 'vmess':
              outbound['uuid'] = urllib.parse.unquote(parsed.username or '')
              if qs.get('type') == 'ws':
                  outbound['transport'] = {'type': 'ws', 'path': qs.get('path','/'), 'headers': {'Host': qs.get('host','')}}
          elif proto in ('socks5','socks','http','https'):
              if parsed.username:
                  outbound['username'] = urllib.parse.unquote(parsed.username)
              if parsed.password:
                  outbound['password'] = urllib.parse.unquote(parsed.password)
          elif proto == 'tuic':
              outbound['uuid'] = urllib.parse.unquote(parsed.username or '')
              outbound['password'] = parsed.password or ''
              outbound['tls'] = {'enabled': True, 'server_name': qs.get('sni',''), 'insecure': qs.get('insecure','0')=='1'}

          config = {
              'log': {'level': 'info'},
              'inbounds': [{'type': 'http', 'tag': 'http-in', 'listen': '127.0.0.1', 'listen_port': 8080}],
              'outbounds': [outbound, {'type': 'direct', 'tag': 'direct'}]
          }
          with open('sing-box-config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print(f'✅ 生成配置: {proto} → {parsed.hostname}:{parsed.port}')
          PYEOF

            # 启动 sing-box
            nohup ./sing-box run -c sing-box-config.json > sing-box.log 2>&1 &
            sleep 3

            echo "🧪 测试代理连通性..."
            RESULT=$(curl -s --proxy http://127.0.0.1:8080 https://api.ipify.org 2>/dev/null)
            if [ -n "$RESULT" ]; then
              echo "✅ 代理出口 IP: $RESULT"
              echo "USE_PROXY=true" >> $GITHUB_ENV
            else
              echo "❌ 代理连接失败，回退到直连"
              echo "USE_PROXY=false" >> $GITHUB_ENV
            fi
          fi

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ secrets.JUSTRUNMY_EMAIL }}
          JUSTRUNMY_PASSWORD: ${{ secrets.JUSTRUNMY_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3

      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
